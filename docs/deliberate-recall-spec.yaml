  turn_loop_call_site:
    file: src/client/SalienceGatedCognition.tsx
    lines: 1279-1287            # const turnResult = await runTurn(systemPrompt, userInput, onDelta, provider)
    streaming_state: lines 924-927 (isProcessing, streamingText) — null streamingText + isProcessing → dot-pulse loader at lines 1586-1600
