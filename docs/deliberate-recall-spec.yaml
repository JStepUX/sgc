    task_tail: lines 188-211    # the persona-independent architectural tail — recall framing lands HERE (so custom personas can't drop it), conditionally
    persona_web_honesty: lines 47-48  # "you cannot search or open pages yourself" — stays true; recall is history, not web. Add one clause distinguishing the two.
  retrieval:
