spec: deliberate recall ("Remembering…" — Sal queries its own history mid-turn via a tool loop)
status: proposed              # 2026-06-09 — raised with the developer and approved per Mission Brief ("raise it first"); build AFTER retrieval-eval-harness-spec.yaml
date: 2026-06-09
depends_on: docs/ignored/retrieval-eval-harness-spec.yaml   # implemented 2026-06-09 (archived) — the probe suite is the regression net for this change
goal: >
  Give Sal a `recall` tool that runs the SAME deterministic retrieval engine
  (searchScored) mid-turn with a query Sal formulates — ambient retrieval stays
  as-is; deliberate recall is added on top. Client-orchestrated tool loop (max
  2 recall rounds), Anthropic provider only in v1. Rides along: an explicit
  absence marker when ambient retrieval surfaces nothing, and matched-term
  provenance on every retrieved fragment. All user-visible / Sal-visible naming
  is diegetic: the tool is `recall`, the UI status is "Remembering…" — no
  GREP_*/internal jargon on screen or in the prompt.

invariant_check:
  no_model_in_retrieval: ranking/threshold/ordering stay 100% searchScored — pure math, byte-identical engine. Sal authors only the QUERY (and may target a turn's neighbors). The model proposes; the math disposes. A model still never decides what a query MATCHES.
  sal_ephemeral: the loop lives entirely WITHIN one turn — rounds share a conversation only for the duration of the turn, then the instance is retired as always. Nothing model-generated persists into any later turn's context via this feature.
  one_call_per_turn: consciously amended, per Mission Brief ("a guardrail, not the law"). Worst case 1 + MAX_RECALL_ROUNDS = 3 calls per turn, only when Sal invokes recall. The guardrail's purpose (a model creeping into RETRIEVAL shows up as an extra call) is preserved: the extra calls here are the REASONING component pausing to ask the deterministic engine — raised 2026-06-09 and approved. CLAUDE.md update is build step 10.
  web_access_unchanged: recall reaches the chat's own history ONLY. No web tools return; URL pre-fetch path untouched.
  classification: model-upstream-of-deterministic-retrieval. NOT embedding/semantic search (still a phase change, still out of scope).

naming:                        # immersion contract — single source of truth for copy
  tool_name: recall            # what Sal sees
  ui_status: "Remembering…"    # shown while a recall round-trip is in flight (U+2026 ellipsis)
  inspector_label: "Deliberate recall"
  rule: no internal jargon (grep/TF-IDF/cosine) in Sal-visible prompt text or user-visible chat UI. The inspector may stay technical — it's the diagnostic surface.

