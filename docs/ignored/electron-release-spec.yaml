        the rows render disabled={!available} (line 250) — a disabled button never fires choose(), so BOTH rows must become clickable when unavailable (keep the dimmed styling so they still read as unconfigured). In choose() (212-215): if !available → do NOT switch; raise onConfigureProvider(p) (new prop) so the parent opens ProviderConfigModal for that provider (D5).
      gear_on_configured_rows: |
        configured rows get a gear icon (lucide, ~14px) revealed on row hover AND :focus-visible (keyboard parity), right-aligned beside the selected dot; clicking it opens ProviderConfigModal pre-filled WITHOUT switching provider. HTML hazard: rows are <button>s (240-272) and nested <button>s are invalid — restructure each row as a relative wrapper with the select button + an absolutely-positioned SIBLING gear button; stopPropagation so gear-click never fires choose().
  - file: src/client/components/ProviderConfigModal.tsx
    new: true
    props: "{ open; provider:'anthropic'|'openai'; configState:ConfigState|null; onSave(patch:ConfigPatch); onCancel; mode:'desktop'|'web' }"
    do: |
      mirror ConfirmPersonaModal styling (frosted overlay, rounded-[22px] dialog, Escape-cancel, Tab focus-trap). Fields per provider:
        anthropic:
