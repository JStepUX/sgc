          model — curated <select> with cost hints (ids per claude-api reference, cached 2026-06-04; verify at implementation):
            (unset)            "server default" — claude-opus-4-7 today
            claude-opus-4-8    "most capable — $5/$25 per MTok"
            claude-sonnet-4-6  "balanced — $3/$15 per MTok"
            claude-haiku-4-5   "fastest + cheapest — $1/$5 per MTok"
            Custom…            → free-text input (any model id)
          max tokens — number input; blank = server default (16384)
        openai (LOCAL):
          base URL — text; placeholder http://localhost:5001/v1 (KoboldCPP); helper text notes Ollama = http://localhost:11434/v1
          model name — text; helper text: label-only for Kobold, MUST match a pulled model for Ollama
          max tokens — number input; blank = server default (512); helper text: 512 can truncate the reply + turn-summary block — suggest 1024+
          api key — password, optional (Kobold ignores it)
      save (desktop): await sgcDesktop.setConfig(patch) → main writes config, restarts server, reloads window. When the modal was opened from an UNCONFIGURED row, pre-set localStorage['sgc.provider'] to that provider before save so the reload lands on it.
      save (web): per-provider inline guidance (env names ANTHROPIC_API_KEY / ANTHROPIC_MODEL / ANTHROPIC_MAX_TOKENS / OPENAI_BASE_URL / LLM_MODEL / LLM_MAX_TOKENS in the server .env + restart); NO network write — server stays frozen.
      validation: base URL must parse as an http(s) URL; max tokens a positive integer; stored keys are never displayed (ConfigState is redacted — only presence booleans).

build_wiring:
  package_json:
    devDeps_add: [ "electron (latest stable w/ utilityProcess ESM, e.g. ^33)", "electron-builder (^25)", "@electron/rebuild (^3)", "esbuild", "wait-on (dev)" ]
    deps_slim_optional: client-only packages currently in "dependencies" get packed into the installer (electron-builder always includes production node_modules) even though Vite already bundles them — move @radix-ui/react-slot, class-variance-authority, chrono-node, clsx, lucide-react, mermaid, react-markdown, remark-gfm, tailwind-merge to devDependencies (react/react-dom already are; verified client-only by grep 2026-06-12). Server-runtime deps STAY in dependencies — @anthropic-ai/sdk, @mozilla/readability, better-sqlite3, cors, dotenv, express, jsdom.
    main: "dist/electron/main.cjs"  # .cjs REQUIRED — "type":"module" makes a .js emit load as ESM and fail; not a contingency
    scripts:
      build:electron: "esbuild electron/main.ts electron/preload.ts --bundle --platform=node --format=cjs --external:electron --outdir=dist/electron --out-extension:.js=.cjs"
      rebuild:electron: "electron-rebuild -f -w better-sqlite3"   # NOT part of dev or build — only for hand-debugging a packaged fork; dev-mode Electron never loads better-sqlite3 (no fork in dev)
      rebuild:node: "npm rebuild better-sqlite3"                  # restore the Node ABI after packing (electron-builder npmRebuild MUTATES node_modules) so vitest/dev work again
      electron:dev: "concurrently -k -n vite,server,electron \"npm:dev:client\" \"npm:dev:server\" \"npm:electron:dev:run\""
      electron:dev:run: "wait-on http://localhost:5555 && npm run build:electron && electron dist/electron/main.cjs"
      electron:build: "npm run build && npm run build:electron"
      dist:win: "npm run electron:build && node scripts/dist-win.mjs"   # wrapper = electron-builder --win --x64 with rebuild:node in FINALLY — even a failed pack restores the Node ABI (an && chain only restores on success; Core Value 3)
      typecheck: 'EXTEND existing: append "&& tsc -p tsconfig.electron.json --noEmit" — esbuild does NOT typecheck; without this electron/ ships untypechecked'
      lint: 'EXTEND existing: "eslint src" → "eslint src electron"'
  electron_builder_config:    # package.json "build" block (or electron-builder.yml)
    appId: com.boltontechnology.sgc
    productName: Salience-Gated Cognition
    directories: { output: release }
    files: [ "dist/electron/**", "dist/server/**", "dist/client/**", "package.json" ]
    asar: true
    asarUnpack: [ "**/node_modules/better-sqlite3/**" ]    # native .node cannot load from inside asar
    npmRebuild: true                                       # rebuilds better-sqlite3 against Electron ABI at pack time
    win: { target: ["nsis"], icon: "public/sal_logo.ico" }
    nsis: { oneClick: false, allowToChangeInstallationDirectory: true, createDesktopShortcut: true }
  gitignore_add: [ "release/" ]

out_of_scope:
  - bundling/downloading a local model — D1 says LOCAL is the user's own server; a bundled runtime is a separate sub-project
  - OS keychain / safeStorage for the key — D2 chose plaintext userData; revisit if security review demands it
  - runtime hot-reload of key/config inside the server — D3 chose restart (D5 keeps it as the apply mechanism); hot-reload would force a server change
  - live model-list probe of the local server (a /v1/models dropdown for LOCAL) — needs either a frozen-server change or a cross-origin renderer fetch with unreliable CORS; free-text model name + helper text instead
  - macOS / Linux targets, code-signing/notarization — D4 is Windows-only
  - auto-update (electron-updater) — separate spec if wanted
  - moving any memory logic server-side — architecture invariant, never

build_sequence:
  - step: 1
    target: deps
    do: add devDeps (+ the optional deps_slim move); npm install. Do NOT electron-rebuild here — dev-mode Electron forks no server, so nothing loads better-sqlite3 under the Electron ABI in dev, and an eager rebuild just breaks vitest/dev:server. The Electron ABI is produced at pack time by electron-builder npmRebuild; the dist:win chain ends with rebuild:node to flip it back.
  - step: 2
    target: electron/config.ts + electron/serverManager.ts
    do: config read/write/atomic + configToEnv; server lifecycle (resolvePort incl. serverPort persistence, fork w/ env incl. SGC_DB_PATH, waitForHealth, stop, restart, log tee). Unit-test configToEnv mapping (incl. serverPort exclusion + llmMaxTokens → LLM_MAX_TOKENS), writeConfig delete-on-empty, and readConfig-on-missing.
  - step: 3
    target: electron/preload.ts + electron/main.ts + build:electron + quality gates
    do: contextBridge surface; window; dev/packaged branch; IPC handlers; will-quit kill. Confirm dist/electron/{main,preload}.cjs emit (.cjs, not .js — see build_wiring). Add tsconfig.electron.json + extend typecheck/lint scripts to cover electron/ — verify a deliberate type error in electron/main.ts FAILS npm run typecheck before moving on.
  - step: 4
    target: set package.json "main"; dev smoke
    do: npm run electron:dev → window loads :5555, app works, NO second :3000 spawned by Electron.
  - step: 5
    target: src/client/lib/desktop.ts + SalienceGatedCognition.tsx + components/ProviderConfigModal.tsx
    do: default→LOCAL; status dots; unconfigured-row click → ProviderConfigModal; gear-on-hover/focus for configured rows (sibling-button structure, no nested <button>); modal fields + desktop/web branches per D5. typecheck + lint green; web build still compiles.
  - step: 6
    target: package.json "build" block + .gitignore
    do: electron-builder config (files, asarUnpack, npmRebuild, win/nsis, icon).
  - step: 7
    target: npm run dist:win
    do: produce NSIS installer in release/ (electron-builder rebuilds native module, unpacks better-sqlite3). The script chain ends with rebuild:node, restoring node_modules to the Node ABI so step 9's npm test passes.
  - step: 8
    target: docs + AGENTS.md + CLAUDE.md
    do: flip this spec status→implemented w/ deviations; AGENTS.md entries (see surprises_to_log); CLAUDE.md "Run it" / structure note gains the Electron build path + scripts. ALSO fix CLAUDE.md's stale Project Structure while in there — src/server is still described as one-route index.ts but db.ts + providers.ts (+ tests) exist; a future agent designing from CLAUDE.md would miss the DB entirely.
  - step: 9
    target: QA
    do: /pre-commit-qa — full npm test + typecheck (client+server) + lint + the verification evidence below. Commit on main.

verification:                 # manual, packaged build
  - fresh_install_defaults_local: clean profile (or delete %APPDATA%/<productName>/sgc-config.json) → chip shows LOCAL; ANTHROPIC row red dot + "not configured"; /api/health.default null
  - unconfigured_row_opens_modal: clicking ANTHROPIC or LOCAL (red dot, enabled-but-unavailable row) opens ProviderConfigModal for that provider instead of switching
  - local_configures_keyless: fresh install, NO Anthropic key — click LOCAL (red) → enter Kobold base URL + max tokens 1024 → save → restart → LOCAL green dot; a turn streams from the local model; no key anywhere in sgc-config.json
  - gear_opens_prefilled: hover (and keyboard-focus) a CONFIGURED row → gear appears; clicking it opens the modal pre-filled WITHOUT switching provider
  - model_picker_applies: switch the anthropic model to claude-haiku-4-5 via the picker → after the reload /api/health providers.anthropic.model reflects it; chip submenu shows the new label
  - save_key_restarts_flips_green: paste sk-ant-… → window briefly reloads (restart + health re-poll) → chip ANTHROPIC, green dot; %APPDATA%/<productName>/sgc-config.json contains the key (plaintext, per D2)
  - turn_streams_from_anthropic: send a message → SSE deltas render; inspector shows token counts (proves restarted server built the anthropic client + routed /api/turn)
  - persistence: create chat + memory, quit fully, relaunch → history + memories present (DB at %APPDATA%/<productName>/data/sgc.db); ANTHROPIC still green AND still the selected provider — proves the persisted serverPort kept the origin (and localStorage) stable across launches
  - port_stable_across_launches: sgc-config.json contains serverPort after first run; a relaunch reuses it (same http://127.0.0.1:<port>); kill a squatter on the port mid-test → app re-picks, updates config, still boots
  - no_orphan: after quit, no node/electron-helper holds the port

surprises_to_log:             # AGENTS.md candidates — title "## <title> (electron release, 2026-06-09)"
  - native_abi_mismatch: better-sqlite3 has no prebuilds. Dev NEVER needs the Electron ABI (dev-mode Electron forks no server; the tsx server runs under Node) — the flip happens at `npm run dist:win`, whose npmRebuild MUTATES node_modules to the Electron ABI; vitest/dev then fail with "NODE_MODULE_VERSION" / "not a valid Win32 application" until rebuild:node runs (chained into dist:win). Log this — future agents WILL hit it.
  - esm_in_utilityprocess: if fork of the ESM server throws a loader error, ensure asar root package.json ("type":"module") is in build.files; else fall back to spawn+ELECTRON_RUN_AS_NODE (kept swappable) — which ALSO requires "dist/server/**" in asarUnpack (plain-Node ESM from inside asar is unreliable). Log whichever path actually shipped.
  - sgc_db_path_mandatory: without SGC_DB_PATH the packaged app writes under process.cwd() (Program Files, non-writable) and crashes at db.ts mkdirSync — note the userData requirement.
  - dist_client_in_asar: SPA static assets load fine from inside asar (fs patched); only the .node needs asarUnpack. Note if any path resolution surprised.
  - preload_cjs: main + preload ship as .cjs BY DESIGN — root package.json "type":"module" makes any .js emit load as ESM. "require is not defined" (main) / "contextBridge is not defined" (preload) = a .js emit slipped back in; check --out-extension:.js=.cjs is still on build:electron.

