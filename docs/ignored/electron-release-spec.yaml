spec: Electron release (Windows) + bring-your-own Anthropic key
status: proposed              # 2026-06-09 — four product decisions locked (see decisions_locked); not yet built
date: 2026-06-09
amended: 2026-06-12           # anchors re-verified vs main + five amendments: persisted serverPort (origin stability), unconditional .cjs emit, rebuild moved to pack time, chip row un-disable for the intercept, fallback asarUnpack note
goal: >
  Ship SGC as a distributable Windows desktop app (electron-builder, NSIS) that
  defaults to the existing LOCAL provider and lets the user supply their own
  Anthropic key from the UI. The key is written to a plaintext config file in
  userData; setting it RESTARTS the embedded server (which still reads keys from
  env at boot — server source unchanged). Renderer loads the embedded server's
  own origin, so the existing relative /api fetches and static SPA serving work
  unchanged.

invariant_check:              # why this is packaging, not a Phase 1.5 phase change
  no_model_in_retrieval: untouched — cosine grep + URL pre-fetch are client-side and provider-agnostic; this work adds no retrieval path
  sal_ephemeral: untouched — one fresh instance per turn; Electron only changes how the process is launched and where the key rests
  one_call_per_turn: untouched — no new model calls; the "restart" is a process relaunch, not an API call
  server_frozen_boot_contract: PRESERVED by design — the restart-on-key-change path exists precisely so src/server/* stays byte-unchanged (key read once at boot, as today)
  classification: distribution + process-supervision + a UI enhancement to an EXISTING dropdown. No thesis surface touched.

decisions_locked:             # set by the developer 2026-06-09; design to these
  - id: D1-local-is-user-server
    decision: LOCAL = the user's own OpenAI-compatible server (Ollama/KoboldCPP via OPENAI_BASE_URL), exactly as today. App bundles NO model. Default provider on a fresh install = LOCAL.
    rationale: smallest scope; matches the implemented local-provider spec. A fresh install with no OPENAI_BASE_URL and no key has neither provider available — server /api/health.default is null; the client default + key flow carry the UX.
    known_gap: the packaged app has NO UI for OPENAI_BASE_URL — LOCAL is configured by hand-editing sgc-config.json then a full app relaunch (config is read only when the server is spawned). Accepted per scope; stated so verification expectations are clear.
  - id: D2-key-plaintext-userdata
    decision: the Anthropic key is stored as plaintext JSON at app.getPath('userData')/sgc-config.json. NOT renderer localStorage, NOT OS keychain.
    rationale: simplest persistence the developer chose; the renderer never persists the secret (preserves "key not in the browser layer"). safeStorage explicitly declined.
  - id: D3-restart-on-key-change
    decision: writing/changing the key restarts the embedded server. Main writes the config file, relaunches the server child with new env, re-polls health, reloads the window. NO runtime hot-reload of the key inside the server.
    rationale: keeps src/server/{index,db,providers}.ts UNCHANGED — they already read keys once at boot, which is exactly what a relaunch needs. Hot-reload would force a server change (out of scope).
  - id: D4-builder-windows-only
    decision: package with electron-builder, Windows-only, NSIS installer.
    rationale: current/only target OS; electron-builder has the best native-module (better-sqlite3) rebuild story.

