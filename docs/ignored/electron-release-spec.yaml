spec: Electron release (Windows) + bring-your-own Anthropic key
status: implemented           # 2026-06-12 — built + packaged + smoke-verified; deviations in implementation_notes
date: 2026-06-09
amended: 2026-06-12           # anchors re-verified vs main + eight amendments: persisted serverPort (origin stability), unconditional .cjs emit, rebuild moved to pack time w/ finally-restore wrapper, chip row un-disable for the intercept, fallback asarUnpack note, provider-config UI (D5 — generalizes the key-only modal, adds llmMaxTokens), electron/ typecheck+lint coverage
implemented: 2026-06-12

implementation_notes:         # deviations + facts discovered at build time
  electron_version: "^41 (41.7.2), NOT latest (42): the build machine has no MSVC, so pack-time npmRebuild needs a better-sqlite3 prebuild for the Electron ABI — ABI 146 (Electron 42) has none, ABI 145 (Electron 41) does. Before bumping the major, check WiseLibs/better-sqlite3 release assets for electron-v<abi>-win32-x64 (see AGENTS.md)."
  userdata_path: "%APPDATA%\\sgc (Electron derives userData from package.json name), NOT %APPDATA%\\<productName> as the verification section assumed — sgc-config.json / data/sgc.db / logs/server.log all live under %APPDATA%\\sgc."
  config_module_shape: "electron/config.ts is electron-free: the file path is injected via initConfig(filePath) (main binds app.getPath('userData') at startup) so the required unit tests run under plain vitest. redactConfig + whitelistPatch also live here; main consumes them."
  modal_save_ownership: "ProviderConfigModal validates + builds the patch; the PARENT owns the bridge call (onSave returns a promise the modal awaits for busy/error state) and the unconfigured-row localStorage pre-set. label is a prop so PROVIDER_LABEL stays the single mapping site."
  env_scrub: "serverManager scrubs the eight managed env names from the inherited process.env before applying configToEnv — sgc-config.json is the single source of provider truth in the packaged app; a stray shell ANTHROPIC_API_KEY can't flip availability."
  extra_files_modified: [ vitest.config.ts (include electron/**), eslint.config.js (electron block) ]
  launch_path_shipped: "utilityProcess.fork PRIMARY path works — ESM server loads from inside asar (root package.json type:module in build.files); spawn fallback unused."
  verified_packaged: [ fresh_install_defaults_local (health default null), port persisted + reused across relaunch, SPA served from asar, DB at userData/data/sgc.db, clean quit / no orphan, Node-ABI restore after pack (192 tests green) ]
  pending_manual_verification: [ unconfigured_row_opens_modal, local_configures_keyless, gear_opens_prefilled, model_picker_applies, save_key_restarts_flips_green, turn_streams_from_anthropic, persistence (chat+memory across relaunch) ]   # need a real key / local model / hands on the UI
  review_hardening_2026-06-12:  # Codex peer review, all three confirmed + fixed
    - setConfig rejects on failed packaged restart (was dialog + success-shaped return; modal now stays open w/ inline error, retry safe over IPC)
    - serverManager exit handler identity-gated (late exit of a force-killed previous child no longer poisons the next child's waitForHealth/isRunning)
    - provider token sent to /api/turn only when health has CONFIRMED it available; else omitted → server boot default (closes the pre-reconcile/failed-health explicit-503 window the LOCAL default opened)
    - repack trap (found re-verifying) — @electron/rebuild's .forge-meta marker survives the Node-ABI restore, so a SECOND pack skipped the Electron rebuild and shipped the Node binary (ERR_DLOPEN_FAILED at boot); dist-win.mjs now electron-rebuild -f BEFORE the pack + scrubs the marker after restore; npmRebuild false (see AGENTS.md)
  artifact: version 1.0.0; build.artifactName "sgc-v${version}.${ext}" → release/sgc-v1.0.0.exe (installed app/shortcut keep the productName)
goal: >
  Ship SGC as a distributable Windows desktop app (electron-builder, NSIS) that
  defaults to the existing LOCAL provider and lets the user configure BOTH
  providers from the UI (D5): Anthropic key + model + max tokens; LOCAL base
  URL + model + max tokens. Config is written to a plaintext file in userData;
  every save RESTARTS the embedded server (which still reads its env at boot —
  server source unchanged). Renderer loads the embedded server's own origin, so
  the existing relative /api fetches and static SPA serving work unchanged.

invariant_check:              # why this is packaging, not a Phase 1.5 phase change
  no_model_in_retrieval: untouched — cosine grep + URL pre-fetch are client-side and provider-agnostic; this work adds no retrieval path
  sal_ephemeral: untouched — one fresh instance per turn; Electron only changes how the process is launched and where the key rests
  one_call_per_turn: untouched — no new model calls; the "restart" is a process relaunch, not an API call
  server_frozen_boot_contract: PRESERVED by design — the restart-on-config-change path exists precisely so src/server/* stays byte-unchanged (key/model/max-tokens all read once at boot, as today — LLM_MAX_TOKENS already an env read at index.ts:58)
  classification: distribution + process-supervision + a UI enhancement to an EXISTING dropdown + a provider-config modal over EXISTING boot-time env. No thesis surface touched.

decisions_locked:             # set by the developer 2026-06-09; design to these
  - id: D1-local-is-user-server
    decision: LOCAL = the user's own OpenAI-compatible server (Ollama/KoboldCPP via OPENAI_BASE_URL), exactly as today. App bundles NO model. Default provider on a fresh install = LOCAL.
    rationale: smallest scope; matches the implemented local-provider spec. A fresh install with no OPENAI_BASE_URL and no key has neither provider available — server /api/health.default is null; the client default + key flow carry the UX.
    known_gap: SUPERSEDED 2026-06-12 by D5 — LOCAL is now configurable from the UI (ProviderConfigModal). Hand-editing sgc-config.json + relaunch remains a valid escape hatch.
  - id: D2-key-plaintext-userdata
    decision: the Anthropic key is stored as plaintext JSON at app.getPath('userData')/sgc-config.json. NOT renderer localStorage, NOT OS keychain.
    rationale: simplest persistence the developer chose; the renderer never persists the secret (preserves "key not in the browser layer"). safeStorage explicitly declined.
  - id: D3-restart-on-key-change
    decision: writing/changing the key restarts the embedded server. Main writes the config file, relaunches the server child with new env, re-polls health, reloads the window. NO runtime hot-reload of the key inside the server.
    rationale: keeps src/server/{index,db,providers}.ts UNCHANGED — they already read keys once at boot, which is exactly what a relaunch needs. Hot-reload would force a server change (out of scope).
  - id: D4-builder-windows-only
    decision: package with electron-builder, Windows-only, NSIS installer.
    rationale: current/only target OS; electron-builder has the best native-module (better-sqlite3) rebuild story.
  - id: D5-provider-config-ui
    decision: >
      (set by the developer 2026-06-12; audience = a non-technical share-target)
      BOTH providers are configurable from the chip dropdown via a single
      ProviderConfigModal. Unconfigured row → clicking it opens that provider's
      modal instead of switching (generalizes the anthropic-only intercept).
      Configured row → hover/focus reveals a gear icon on the row → opens the
      same modal pre-filled; clicking the row itself still switches provider.
      Save = writeConfig(patch) → server restart → window reload (D3
      generalized from key-only to ALL provider config — restart stays the
      apply mechanism, no hot-reload).
    fields:
      anthropic: api key (password; blank = keep existing), model (curated picker + Custom free-text), max tokens (blank = server default 16384)
      openai_local: base URL, model name (label-only for Kobold; must match a pulled model for Ollama), max tokens (blank = server default 512), optional api key
    rationale: >
      the share-target runs apps "by the seat of their pants" with guidance
      docs — every config surface that was a JSON hand-edit becomes a modal
      field. Also closes the llmMaxTokens gap: SgcConfig had no field mapping
      to LLM_MAX_TOKENS, so packaged local turns were pinned to the 512-token
      server default with no .env to override — tight enough to truncate the
      reply + <turn-summary> block and break summary parsing.

