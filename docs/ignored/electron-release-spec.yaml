architecture:
  load_strategy: packaged renderer loads http://127.0.0.1:<port> (the embedded server's OWN origin) — relative /api fetches + static SPA both work, no CORS, no client URL change
  origin_stability: localStorage is per-origin and the origin embeds the port — so the port MUST be stable across launches, not just within a session. serverManager persists the chosen port to sgc-config.json (serverPort) and reuses it every launch, re-picking only if occupied. Without this, sgc.provider (and any future client-side persistence) silently resets on every launch — a user with both providers configured would re-land on LOCAL each time.
  dev_vs_packaged: app.isPackaged === false → load Vite dev URL http://localhost:5555 and do NOT spawn a server (the existing `npm run dev` concurrently flow already runs client+server). app.isPackaged === true → spawn server, poll health, load its origin.
  key_invariant_kept: server source untouched; main supplies env to the fork; key change = relaunch fork

server:
  changes: NONE                # load-bearing — src/server/{index,db,providers}.ts stay byte-identical
  required_env_from_main:      # the fork's env, derived from sgc-config.json + computed paths
    PORT: <dynamic free 127.0.0.1 port>
    SGC_DB_PATH: <userData>/data/sgc.db    # MANDATORY — else db.ts falls back to process.cwd() (non-writable in a packaged app)
    CORS_ORIGIN: http://127.0.0.1:<port>   # same-origin anyway; set defensively
    ANTHROPIC_API_KEY: <from config, omitted when absent>   # absent → anthropic provider stays unavailable, as today
    ANTHROPIC_MODEL / ANTHROPIC_MAX_TOKENS / OPENAI_BASE_URL / OPENAI_API_KEY / LLM_MODEL / LLM_MAX_TOKENS / LLM_PROVIDER: forwarded from config when present
  dotenv_note: server imports 'dotenv/config'; no .env in the package (keep .env OUT of build.files) → dotenv no-ops, fork env wins (dotenv does not override already-set process.env)

electron_shell:               # new dir electron/ → bundled to dist/electron/ as CJS via esbuild
  language: TypeScript; main + preload bundled to CJS and emitted as .cjs — NOT .js. Root package.json is "type":"module", so a .js emit loads as ESM and CJS-in-.js deterministically fails; this is a certainty, not a contingency. (Sandboxed preload requires CJS; forked SERVER stays ESM in a separate process — no conflict.)
  files:
    - path: electron/config.ts → dist/electron (bundled into main)
      exports: |
        interface SgcConfig { anthropicApiKey?:string; anthropicModel?:string; anthropicMaxTokens?:number;
          openaiBaseUrl?:string; openaiApiKey?:string; llmModel?:string; llmMaxTokens?:number;
          llmProvider?:'anthropic'|'openai';
          serverPort?:number }             // serverPort: persisted by serverManager — see architecture.origin_stability
        readConfig(): SgcConfig            // {} if missing/corrupt; never throws
        writeConfig(patch: Partial<SgcConfig>): SgcConfig   // merge + atomic tmp-write then renameSync; empty-string/null patch value DELETES the field (clear semantics for the modal)
        configToEnv(cfg): Record<string,string>             // map present fields → server env names ONLY (llmMaxTokens → LLM_MAX_TOKENS); serverPort EXCLUDED (consumed by serverManager, which sets PORT itself)
      location: path.join(app.getPath('userData'),'sgc-config.json')
    - path: electron/serverManager.ts → bundled into main
      exports: |
        interface ServerHandle { port:number; pid:number }
        start(): Promise<ServerHandle>     // resolvePort → fork → waitForHealth
        restart(): Promise<ServerHandle>   // stop → start (same port within a session; the origin must not change across the reload)
        stop(): Promise<void>              // SIGTERM → SIGKILL fallback
        getPort(): number|null; isRunning(): boolean
      launch: |
        PRIMARY: utilityProcess.fork(serverEntryAbs, [], { env, stdio:'pipe' }) — Electron's Node + ABI, MessagePort channel, lifecycle-managed.
        FALLBACK (behind ONE swappable fn): child_process.spawn(process.execPath,[serverEntryAbs],{ env:{...,ELECTRON_RUN_AS_NODE:'1'} }) — same ABI, Node's own ESM loader. Use if ESM-in-utilityProcess misbehaves on the chosen Electron version. If this fallback SHIPS, also add "dist/server/**" to asarUnpack — plain-Node ESM loading from inside asar is unreliable under ELECTRON_RUN_AS_NODE.
        serverEntryAbs = path.join(__dirname,'../server/index.js') (absolute, from dist/electron/)
      resolve_port: prefer readConfig().serverPort when set AND free (probe it); else net.createServer().listen(0) on 127.0.0.1 → read address().port → close; writeConfig({serverPort:chosen}) whenever it changes. Keeps the origin — and localStorage — stable across launches (architecture.origin_stability). Small TOCTOU; health-poll + ≤3 retries cover collisions.
      wait_for_health: poll GET http://127.0.0.1:<port>/api/health every ~150ms until {ok:true}; ~15s timeout; abort early if child exits/errors; tee child stdout/stderr → <userData>/logs/server.log; on failure dialog.showErrorBox with the log tail
      kill_on_quit: app.on('will-quit') → stop()
    - path: electron/preload.ts → dist/electron/preload.cjs (CJS, contextIsolation safe)
      contextBridge: |
        exposeInMainWorld('sgcDesktop', {
          isDesktop: true,
          getConfigState(): Promise<ConfigState>,       // ipcRenderer.invoke('sgc:getConfigState')
          setConfig(patch:ConfigPatch): Promise<ConfigState>  // ipcRenderer.invoke('sgc:setConfig', patch) — writes + restarts + reloads
        })
        ConfigPatch = Partial<Pick<SgcConfig,'anthropicApiKey'|'anthropicModel'|'anthropicMaxTokens'|'openaiBaseUrl'|'openaiApiKey'|'llmModel'|'llmMaxTokens'>>
                      // whitelisted in MAIN, not just typed — llmProvider/serverPort are never renderer-settable; empty-string field = delete from config
        ConfigState = { anthropicKeyPresent:boolean; openaiKeyPresent:boolean; anthropicModel?:string; anthropicMaxTokens?:number;
                        openaiBaseUrl?:string; llmModel?:string; llmMaxTokens?:number }  // REDACTED — never raw keys
    - path: electron/main.ts → dist/electron/main.cjs ("main" in package.json)
      window: { webPreferences: { preload, contextIsolation:true, nodeIntegration:false, sandbox:true } }
      flow: "app.isPackaged ? (serverManager.start() → loadURL('http://127.0.0.1:'+port)) : loadURL('http://localhost:5555')+openDevTools"
      ipc: |
        handle('sgc:getConfigState', () => redact(readConfig()))
        handle('sgc:setConfig', async (_e,patch) => { writeConfig(whitelist(patch)); const h = await serverManager.restart(); reloadWindow(h); return redact(readConfig()) })
        // whitelist() drops non-ConfigPatch keys (llmProvider, serverPort, anything unknown) so the renderer can never steer process supervision

