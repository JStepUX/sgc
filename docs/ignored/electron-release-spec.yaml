      default_to_local: change provider useState fallback (line 1000) 'anthropic' → 'openai'. health-reconcile (1128-1148) still self-corrects to whatever's available, so existing web deploys are unaffected; only the truly-empty fresh install lands on LOCAL.
      status_dots: in the rows map (240-272) add a leading dot per provider from health?.providers[p]?.available → bg-success (present) vs bg-danger (missing); mirror the ember glow at 267-269. Add the same dot to the collapsed chip button (219-230) for the CURRENT provider.
